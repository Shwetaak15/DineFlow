services:
  - type: web
    name: dineflow
    env: node
    plan: free
    buildCommand: npm install --prefix backend && npm install --prefix frontend && npm run build --prefix frontend
    startCommand: npm start --prefix backend
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 5050
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
